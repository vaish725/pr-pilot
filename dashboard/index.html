<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Pilot Admin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f6f8fa; color: #1c1c1e; line-height: 1.5; }
    a { color: #0969da; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const SEV_COLORS = {
      SECURITY: { bg: '#b71c1c', text: '#fff' },
      BUG:      { bg: '#e65100', text: '#fff' },
      STYLE:    { bg: '#1565c0', text: '#fff' },
      SUGGESTION: { bg: '#4a4a4a', text: '#fff' },
    };

    function SevBadge({ sev }) {
      const c = SEV_COLORS[sev] || { bg: '#555', text: '#fff' };
      return (
        <span style={{
          background: c.bg, color: c.text,
          borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 700,
          letterSpacing: '0.03em',
        }}>{sev}</span>
      );
    }

    function StatCard({ label, value, sub, accent }) {
      return (
        <div style={{
          background: '#fff', border: '1px solid #d0d7de', borderRadius: 8,
          padding: '18px 22px', minWidth: 150, flex: '1 1 140px',
        }}>
          <div style={{ fontSize: 12, color: '#57606a', marginBottom: 4 }}>{label}</div>
          <div style={{ fontSize: 30, fontWeight: 700, color: accent || '#1c1c1e' }}>{value ?? '—'}</div>
          {sub && <div style={{ fontSize: 12, color: '#57606a', marginTop: 2 }}>{sub}</div>}
        </div>
      );
    }

    function AcceptanceColor(rate) {
      if (rate == null) return undefined;
      if (rate >= 0.7) return '#2e7d32';
      if (rate >= 0.4) return '#e65100';
      return '#c62828';
    }

    function App() {
      const [input, setInput] = useState('');
      const [repoLabel, setRepoLabel] = useState('');
      const [stats, setStats] = useState(null);
      const [reviews, setReviews] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      async function handleSearch(e) {
        e.preventDefault();
        const trimmed = input.trim();
        const parts = trimmed.split('/');
        if (parts.length !== 2 || !parts[0] || !parts[1]) {
          setError('Enter in owner/repo format, e.g. acme/api');
          return;
        }
        const [owner, repo] = parts;
        setLoading(true);
        setError(null);
        setStats(null);
        setReviews([]);
        setRepoLabel(trimmed);
        try {
          const [sRes, rRes] = await Promise.all([
            fetch(`/stats/${owner}/${repo}`),
            fetch(`/reviews/${owner}/${repo}`),
          ]);
          if (!sRes.ok) {
            const body = await sRes.json().catch(() => ({}));
            throw new Error(body.error || `Stats request failed (${sRes.status})`);
          }
          setStats(await sRes.json());
          if (rRes.ok) {
            const rData = await rRes.json();
            setReviews(rData.reviews || []);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }

      const acceptancePct = stats?.acceptance_rate != null
        ? `${(stats.acceptance_rate * 100).toFixed(1)}%`
        : null;

      return (
        <div style={{ maxWidth: 960, margin: '0 auto', padding: '36px 20px' }}>

          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 28 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 8,
              background: '#0969da', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ color: '#fff', fontSize: 16, fontWeight: 700 }}>P</span>
            </div>
            <h1 style={{ fontSize: 20, fontWeight: 700 }}>PR Pilot Admin</h1>
          </div>

          {/* Search */}
          <form onSubmit={handleSearch} style={{ display: 'flex', gap: 8, marginBottom: 32 }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              placeholder="owner/repo"
              style={{
                flex: 1, padding: '9px 14px', border: '1px solid #d0d7de',
                borderRadius: 6, fontSize: 14, outline: 'none',
                background: '#fff',
              }}
            />
            <button
              type="submit"
              disabled={loading}
              style={{
                padding: '9px 20px', background: loading ? '#8ab4f8' : '#0969da',
                color: '#fff', border: 'none', borderRadius: 6,
                cursor: loading ? 'default' : 'pointer', fontSize: 14, fontWeight: 500,
              }}
            >{loading ? 'Loading…' : 'Load stats'}</button>
          </form>

          {/* Error */}
          {error && (
            <div style={{
              background: '#fff1f0', border: '1px solid #ffa39e', borderRadius: 6,
              padding: '12px 16px', marginBottom: 28, color: '#a8071a', fontSize: 14,
            }}>{error}</div>
          )}

          {/* Stats */}
          {stats && (
            <>
              <div style={{ fontSize: 13, color: '#57606a', marginBottom: 12 }}>
                Showing stats for <strong>{repoLabel}</strong>
              </div>

              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 24 }}>
                <StatCard label="Total Reviews" value={stats.total_reviews} />
                <StatCard label="Total Comments" value={stats.total_comments} />
                <StatCard label="Reactions" value={stats.total_reactions} />
                <StatCard
                  label="Acceptance Rate"
                  value={acceptancePct ?? '—'}
                  sub={stats.total_reactions > 0 ? `${stats.total_reactions} reactions` : 'no reactions yet'}
                  accent={AcceptanceColor(stats.acceptance_rate)}
                />
              </div>

              {/* Severity breakdown */}
              {Object.keys(stats.severity_breakdown || {}).length > 0 && (
                <div style={{
                  background: '#fff', border: '1px solid #d0d7de', borderRadius: 8,
                  padding: '16px 20px', marginBottom: 24,
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Severity Breakdown</div>
                  <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', alignItems: 'center' }}>
                    {Object.entries(stats.severity_breakdown)
                      .sort((a, b) => b[1] - a[1])
                      .map(([sev, cnt]) => (
                        <div key={sev} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                          <SevBadge sev={sev} />
                          <span style={{ fontSize: 20, fontWeight: 700 }}>{cnt}</span>
                        </div>
                      ))}
                  </div>
                </div>
              )}

              {/* Recent reviews table */}
              <div style={{ background: '#fff', border: '1px solid #d0d7de', borderRadius: 8, overflow: 'hidden' }}>
                <div style={{
                  padding: '13px 20px', borderBottom: '1px solid #d0d7de',
                  fontSize: 13, fontWeight: 600, display: 'flex', justifyContent: 'space-between',
                }}>
                  <span>Recent Reviews</span>
                  {reviews.length > 0 && (
                    <span style={{ color: '#57606a', fontWeight: 400 }}>{reviews.length} shown</span>
                  )}
                </div>

                {reviews.length === 0 ? (
                  <div style={{ padding: '24px 20px', color: '#57606a', fontSize: 13 }}>
                    No reviews recorded yet.
                  </div>
                ) : (
                  <div style={{ overflowX: 'auto' }}>
                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                      <thead>
                        <tr style={{ background: '#f6f8fa' }}>
                          {['PR', 'Commit', 'Files', 'Comments', 'Posted', 'Time'].map(h => (
                            <th key={h} style={{
                              padding: '8px 16px', textAlign: 'left',
                              fontWeight: 600, color: '#57606a',
                              borderBottom: '1px solid #d0d7de',
                            }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {reviews.map((r, i) => (
                          <tr key={r.id} style={{ borderTop: i === 0 ? 'none' : '1px solid #f0f0f0' }}>
                            <td style={{ padding: '10px 16px', fontWeight: 600 }}>#{r.pr_number}</td>
                            <td style={{ padding: '10px 16px', fontFamily: 'monospace', color: '#57606a', fontSize: 12 }}>
                              {r.head_sha ? r.head_sha.slice(0, 7) : '—'}
                            </td>
                            <td style={{ padding: '10px 16px' }}>{r.files_reviewed ?? 0}</td>
                            <td style={{ padding: '10px 16px' }}>{r.comment_count ?? 0}</td>
                            <td style={{ padding: '10px 16px' }}>
                              <span style={{
                                background: r.posted ? '#dafbe1' : '#f6f8fa',
                                color: r.posted ? '#1a7f37' : '#57606a',
                                border: `1px solid ${r.posted ? '#a7f3c0' : '#d0d7de'}`,
                                borderRadius: 12, padding: '1px 8px', fontSize: 11,
                              }}>{r.posted ? 'posted' : 'dry run'}</span>
                            </td>
                            <td style={{ padding: '10px 16px', color: '#57606a' }}>
                              {r.created_at
                                ? new Date(r.created_at).toLocaleString(undefined, {
                                    month: 'short', day: 'numeric',
                                    hour: '2-digit', minute: '2-digit',
                                  })
                                : '—'}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
